<script>

function getLocalDay(hourUTC, dayStr){

if(hourUTC === "ALL" || hourUTC === undefined){
return dayStr;   // 🔥 FIX
}

let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let date = new Date();

if(typeof hourUTC === "string" && hourUTC.includes(":")){
hourUTC = Number(hourUTC.split(":")[0]);
}else{
hourUTC = Number(hourUTC);
}

date.setUTCHours(hourUTC,0,0,0);

let targetDay = days.indexOf(dayStr);
let diff = targetDay - date.getUTCDay();
if(diff < 0) diff += 7;

date.setUTCDate(date.getUTCDate() + diff);

// 🔥 convert to LOCAL day
return days[date.getDay()];
}  
  
let rawData = [];
  
let prepData = {};  
  
let shortEvents = [];
let longEvents = [];  
  
async function loadTicker(){

try{

let res = await fetch("data/announcement.json");
let data = await res.json();

let ticker = document.getElementById("ticker");
let text = document.querySelector(".tickerText");

if(!data.enabled){
ticker.style.display = "none";
return;
}

let now = new Date();

// 🔥 DEFAULT STATES
let isEmergency = false;

// 🔥 CHECK TIMED EMERGENCY
if(data.emergency && data.emergency.active){

let start = data.emergency.startTime ? new Date(data.emergency.startTime) : null;
let end = data.emergency.endTime ? new Date(data.emergency.endTime) : null;

// cases:
// 1. both start + end
if(start && end){
if(now >= start && now <= end){
isEmergency = true;
}
}

// 2. only end (active immediately until end)
else if(!start && end){
if(now <= end){
isEmergency = true;
}
}

// 3. only start (active after start indefinitely)
else if(start && !end){
if(now >= start){
isEmergency = true;
}
}

// 4. fallback (manual on)
else{
isEmergency = true;
}

}

// 🔥 APPLY MESSAGE
if(isEmergency){
text.innerHTML = "🚨 " + data.message;
ticker.classList.add("emergency");
}else{
text.innerHTML = data.normalMessage || data.message;
ticker.classList.remove("emergency");
}

}catch(e){
console.log("Ticker load error", e);
}

}

async function loadSpecialEvents(){
  try{

    let [shortRes, longRes] = await Promise.all([
      fetch("data/specialShort.json"),
      fetch("data/specialLong.json")
    ]);

    shortEvents = await shortRes.json();
    longEvents = await longRes.json();

    console.log("Short events loaded:", shortEvents.length);
    console.log("Long events loaded:", longEvents.length);

  }catch(e){
    console.log("Special events load error", e);
  }
}  

function getActiveShortEvent(){

let now = new Date();

let candidates = [];

shortEvents.forEach(e => {

if(!e.active) return;

let start = new Date(e.start);
let durationMs = e.duration * 60 * 1000;

let active = false;
let prep = false;
let cooldown = false;

if(e.repeat > 0){

let diff = now - start;
let cycle = Math.floor(diff / (e.repeat * 60 * 60 * 1000));
let cycleStart = new Date(start.getTime() + cycle * e.repeat * 60 * 60 * 1000);
let cycleEnd = new Date(cycleStart.getTime() + durationMs);

let remaining = cycleEnd - now;

if(now >= cycleStart && now <= cycleEnd){
active = true;
if(remaining <= 5 * 60 * 1000) cooldown = true;
}else if(now < cycleStart){
prep = true;
}else{
cooldown = true;
}

candidates.push({
event:e,
state: active ? "active" : prep ? "prep" : "cooldown",
priority: (e.priority !== undefined ? e.priority : 999),
start:cycleStart,
end:cycleEnd
});

}else{

// 🔥 non-repeating short event (fixed)
let end = new Date(start.getTime() + durationMs);

if(now < start){

// PREP
candidates.push({
event:e,
state: "prep",
priority:e.priority || 999,
start:start,
end:end
});

}else if(now >= start && now <= end){

// ACTIVE / COOLDOWN
let remaining = end - now;

candidates.push({
event:e,
state: remaining <= 5 * 60 * 1000 ? "cooldown" : "active",
priority:e.priority || 999,
start:start,
end:end
});

}

// after end → ignored

}

});

if(candidates.length === 0) return null;

// 🔥 PRIORITY SORT
candidates.sort((a,b)=>{

let order = {active:0, prep:1, cooldown:2};

if(order[a.state] !== order[b.state]){
return order[a.state] - order[b.state];
}

return a.priority - b.priority;

});

return candidates[0];
}

function updateSpecialBar(){

let data = getActiveShortEvent();

if(!data){
document.getElementById("ghoulionTimer").innerHTML = "";
return;
}

let e = data.event;   // ✅ DEFINE FIRST
document.getElementById("ghoulionTitle").innerText = e.name;
document.getElementById("ghoulionTitle").style.color = e.color || "#ffd54f";  

// 🔥 NOW SAFE TO USE
let imgName = e.name.toLowerCase().replace(/\s+/g,"_");
let imgSrc = "images/events/" + imgName + ".png";

document.getElementById("ghoulionImg").src = imgSrc;

let now = new Date();

let remaining = data.end - now;

let h = Math.floor(remaining / 1000 / 60 / 60);
let m = Math.floor((remaining / 1000 / 60) % 60);

let localTime = data.end.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit',
hour12:true
});

let label = "Next";

if(data.state === "active") label = "Active";
if(data.state === "prep") label = "Next";
if(data.state === "cooldown") label = "Wrap";

let barClass = "ghoulionBar";

if(data.state === "active") barClass += " active";
if(data.state === "prep") barClass += " alert";

let timerText =
"<div class='" + barClass + "'>" +
label + " • " + localTime +
" • " + h + "h " + m + "m</div>";

document.getElementById("ghoulionTimer").innerHTML = timerText;

}

function updateLongEventTicker(){

let now = new Date();

let events = longEvents
  .filter(e => e.active)
  .sort((a,b) => new Date(a.end) - new Date(b.end))
  .map(e => {

    let end = new Date(e.end);

    return {
      ...e,
      end
    };

  });

events = events.filter(e => e.end > now);

  
// 🔥 PRIORITY LOGIC
//let activeEvents = longEvents.filter(e => e.isActive);

//if(activeEvents.length){

// 🔥 SORT active events by priority
//activeEvents.sort((a,b)=> (a.priority || 999) - (b.priority || 999));

// 🔥 TAKE ONLY TOP PRIORITY
//longEvents = [activeEvents[0]];
//}else{

// 🔥 ONLY future events
//let upcoming = longEvents.filter(e => {


// 🔥 must not have already started
//return e.start > now;

//});

// 🔥 SORT by nearest
//upcoming.sort((a,b)=> a.start.getTime() - b.start.getTime());

// 🔥 TAKE ONLY THE NEXT ONE
//longEvents = upcoming.length ? [upcoming[0]] : [];

//}

let html = "";

events.forEach(e => {

if(!e.end) return;  

let end = new Date(e.end);

if(now > end) return;

let diff = end - now;

let d = Math.floor(diff / (1000*60*60*24));
let h = Math.floor((diff / (1000*60*60)) % 24);
let m = Math.floor((diff / (1000*60)) % 60);

let urgent = diff <= 24*60*60*1000;

let cls = urgent ? "eventItem eventUrgent" : "eventItem";

let imgName = e.name.toLowerCase().replace(/\s+/g,"_");
let imgSrc = "images/events/" + imgName + ".png";

html += `
<span class="${cls}">
<img src="${imgSrc}">
${e.name} • ${d}d ${h}h ${m}m
</span>
`;

});

document.getElementById("eventTicker").innerHTML =
'<div class="eventScroll">' + html + html + '</div>';
}    

async function loadTasks(){
try{

function buildTaskMap(){

let map = {};
  
console.log("Sample task:", rawData[0]);  

rawData.forEach(e => {

let key = e.d + "|" + e.t;

if(!map[key]){
map[key] = {
d: e.d,
task: e.t,
times: [],
events: [],
dayExclusive: e.dayExclusive === true  
};
}

map[key].times.push(e.utc);
map[key].events.push(e.e);

});

return Object.values(map);

}  

function classifyTasks(){

let tasks = buildTaskMap();

let triple = [];
let double = [];
let dayExclusive = [];  

tasks.forEach(t => {

let uniqueEvents = [...new Set(t.events)];
let count = uniqueEvents.length;

if(count >= 3){
triple.push({...t, type:"triple"});
}
else if(count === 2){
double.push({...t, type:"double"});
}

console.log("Exclusive check:", t.task, t.dayExclusive);
  
if(t.dayExclusive === true){
dayExclusive.push(t);
} 

});

return {triple, double, dayExclusive};

}

function formatToLocalTime(hourUTC, dayStr){

if(hourUTC === "ALL" || hourUTC === undefined){
return "All Day";
}

if(typeof hourUTC === "string" && hourUTC.includes(":")){
hourUTC = Number(hourUTC.split(":")[0]);
}else{
hourUTC = Number(hourUTC);
}

let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
let targetDay = days.indexOf(dayStr);

let date = new Date();
date.setUTCHours(hourUTC,0,0,0);

let diff = targetDay - date.getUTCDay();
if(diff < 0) diff += 7;

date.setUTCDate(date.getUTCDate() + diff);

return date.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit',
hour12:true
});

}

function getNextOccurrence(task){

let now = new Date();
let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let h = task.times.find(x => x !== "ALL");

// ALL DAY → treat as current day end
if(!h){
let d = new Date();
d.setHours(23,59,59,999);
return d;
}

// parse hour
if(typeof h === "string" && h.includes(":")){
h = Number(h.split(":")[0]);
}else{
h = Number(h);
}

// base UTC time
let date = new Date();
date.setUTCHours(h,0,0,0);

// align to correct weekday
let diff = days.indexOf(task.d) - date.getUTCDay();
if(diff < 0) diff += 7;

date.setUTCDate(date.getUTCDate() + diff);

// 🔥 KEY FIX: if already passed → move to NEXT WEEK
if(date < now){
date.setUTCDate(date.getUTCDate() + 7);
}

return date;
}

function getCurrentOrNextOccurrence(task){

let now = new Date();
let next = getNextOccurrence(task);

// 🔥 Power Play active window = 4h before
if(task.events.includes("Power Play")){

let start = new Date(next.getTime() - 4 * 60 * 60 * 1000);

if(now >= start && now <= next){
return {
time: next,
isActive: true
};
}

}

return {
time: next,
isActive: false
};

}

function renderDayExclusive(){

let {dayExclusive} = getTasks();

let container = document.getElementById("dayExclusiveList");

container.innerHTML = "";

// 🔥 group by task name
let map = {};

dayExclusive.forEach(t => {

if(!map[t.task]){
map[t.task] = [];
}

map[t.task].push(t.d);

});

// 🔥 render grouped output
Object.keys(map)
.sort((a,b)=>{

let order = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
let todayIndex = new Date().getUTCDay();

function getNextIndex(days){
let indices = days.map(d => order.indexOf(d));

// convert to "distance from today"
let diffs = indices.map(i => (i - todayIndex + 7) % 7);

// return nearest upcoming day
return Math.min(...diffs);
}

let da = getNextIndex(map[a]);
let db = getNextIndex(map[b]);

return da - db;

})
.forEach(task => {

let days = map[task];

// sort days (Sun → Sat)
let order = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
days.sort((a,b)=> order.indexOf(a) - order.indexOf(b));

let row = document.createElement("div");
row.className = "row";

row.innerHTML = `
<span>${days.join(" | ")}</span>
<span>${task}</span>
`;

container.appendChild(row);

});

}

function getDayCountdown(type){

let now = new Date();

let end = new Date();
end.setUTCHours(24,0,0,0);

let diff = end - now;

let h = Math.floor(diff/1000/60/60);
let m = Math.floor((diff/1000/60)%60);

if(type === "end"){
return `<span style="color:#ff6a6a">ends</span> in ${h}h ${m}m`;
}

return `<span style="color:#4dff88">starts</span> in ${h}h ${m}m`;

}
  
function updateTimer(){

timer.innerHTML = "No triple tasks";
return;
}

let soonest = null;
let now = new Date();

triple.forEach(t => {

let occ = getCurrentOrNextOccurrence(t);
let nextTime = occ.time;
let isActive = occ.isActive;

// 🔥 ACTIVE detection (Power Play only)

// PRIORITY 1 → ACTIVE
if(isActive && !selected){
selected = {task:t, time:nextTime};
return;
}

// PRIORITY 2 → NEXT
if(!soonest || nextTime < soonest.time){
soonest = {task:t, time:nextTime};
}

});

// fallback
if(!selected && soonest){
selected = soonest;
}

// 🔥 HARD FALLBACK (ADD THIS RIGHT BELOW)
if(!selected && triple.length){
let nextTime = getNextOccurrence(triple[0]);
selected = {task: triple[0], time: nextTime};
}

timer.innerHTML = "No upcoming tasks";
return;
}

let nextTime = selected.time;

// 🔥 ALL DAY

// 🔥 ACTIVE display

let start = new Date(nextTime.getTime() - 4 * 60 * 60 * 1000);

isActive = true;
}
}

hour12:true
}) + " - " +

hour12:true
});

}else{

let diff = nextTime - now;

timer.innerHTML =
"<small>Next</small><br><b>"+task.task+"</b><br>"+

}

}
