<script>
  
 
function getLocalDay(hourUTC, dayStr){

if(hourUTC === "ALL" || hourUTC === undefined){
return dayStr;   // 🔥 FIX
}

let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let date = new Date();

if(typeof hourUTC === "string" && hourUTC.includes(":")){
hourUTC = Number(hourUTC.split(":")[0]);
}else{
hourUTC = Number(hourUTC);
}

date.setUTCHours(hourUTC,0,0,0);

let targetDay = days.indexOf(dayStr);
let diff = targetDay - date.getUTCDay();
if(diff < 0) diff += 7;

date.setUTCDate(date.getUTCDate() + diff);

// 🔥 convert to LOCAL day
return days[date.getDay()];
}  
  
let rawData = [];
  
let prepData = [];
let prepMap = {};  
  
let shortEvents = [];
let longEvents = [];  
  
async function loadTicker(){

try{

let res = await fetch("data/announcement.json");
let data = await res.json();

let ticker = document.getElementById("ticker");
let text = document.querySelector(".tickerText");

if(!data.enabled){
ticker.style.display = "none";
return;
}

let now = new Date();

// 🔥 DEFAULT STATES
let isEmergency = false;

// 🔥 CHECK TIMED EMERGENCY
if(data.emergency && data.emergency.active){

let start = data.emergency.startTime ? new Date(data.emergency.startTime) : null;
let end = data.emergency.endTime ? new Date(data.emergency.endTime) : null;

// cases:
// 1. both start + end
if(start && end){
if(now >= start && now <= end){
isEmergency = true;
}
}

// 2. only end (active immediately until end)
else if(!start && end){
if(now <= end){
isEmergency = true;
}
}

// 3. only start (active after start indefinitely)
else if(start && !end){
if(now >= start){
isEmergency = true;
}
}

// 4. fallback (manual on)
else{
isEmergency = true;
}

}

// 🔥 APPLY MESSAGE
if(isEmergency){
text.innerHTML = "🚨 " + data.message;
ticker.classList.add("emergency");
}else{
text.innerHTML = data.normalMessage || data.message;
ticker.classList.remove("emergency");
}

}catch(e){
console.log("Ticker load error", e);
}

}

async function loadSpecialEvents(){
  try{

    let [shortRes, longRes] = await Promise.all([
      fetch("data/specialShort.json"),
      fetch("data/specialLong.json")
    ]);

    shortEvents = await shortRes.json();
    longEvents = await longRes.json();

    console.log("Short events loaded:", shortEvents.length);
    console.log("Long events loaded:", longEvents.length);

  }catch(e){
    console.log("Special events load error", e);
  }
}  

function getActiveShortEvent(){

let now = new Date();

let candidates = [];

shortEvents.forEach(e => {

if(!e.active) return;

let start = new Date(e.start);
let durationMs = e.duration * 60 * 1000;

let active = false;
let prep = false;
let cooldown = false;

if(e.repeat > 0){

let repeatMs = e.repeat * 60 * 60 * 1000;

// 🔥 FIX: handle first cycle properly
let diff = now - start;

let cycle = diff < 0 ? 0 : Math.floor(diff / repeatMs);
let cycleStart = new Date(start.getTime() + cycle * e.repeat * 60 * 60 * 1000);
let cycleEnd = new Date(cycleStart.getTime() + durationMs);

let remaining = cycleEnd - now;

if(now >= cycleStart && now <= cycleEnd){
active = true;
if(remaining <= 5 * 60 * 1000) cooldown = true;
}else if(now < cycleStart){
prep = true;
}else{
cooldown = true;
}

candidates.push({
event:e,
state: active ? "active" : prep ? "prep" : "cooldown",
priority: (e.priority !== undefined ? e.priority : 999),
start:cycleStart,
end:cycleEnd
});

}else{

// 🔥 non-repeating short event (fixed)
let end = new Date(start.getTime() + durationMs);

if(now < start){

// PREP
candidates.push({
event:e,
state: "prep",
priority:e.priority || 999,
start:start,
end:end
});

}else if(now >= start && now <= end){

// ACTIVE / COOLDOWN
let remaining = end - now;

candidates.push({
event:e,
state: remaining <= 5 * 60 * 1000 ? "cooldown" : "active",
priority:e.priority || 999,
start:start,
end:end
});

}

// after end → ignored

}

});

if(candidates.length === 0) return null;

// 🔥 PRIORITY SORT
candidates.sort((a,b)=>{

let order = {active:0, prep:1, cooldown:2};

if(order[a.state] !== order[b.state]){
return order[a.state] - order[b.state];
}

return a.priority - b.priority;

});

return candidates[0];
}

function updateSpecialBar(){

let data = getActiveShortEvent();

if(!data){
document.getElementById("ghoulionTimer").innerHTML = "";
return;
}

let e = data.event;   // ✅ DEFINE FIRST
document.getElementById("ghoulionTitle").innerText = e.name;
document.getElementById("ghoulionTitle").style.color = e.color || "#ffd54f";  

// 🔥 NOW SAFE TO USE
let imgName = e.name.toLowerCase().replace(/\s+/g,"_");
let imgSrc = "images/events/" + imgName + ".png";

document.getElementById("ghoulionImg").src = imgSrc;

let now = new Date();

let remaining = data.end - now;

let h = Math.floor(remaining / 1000 / 60 / 60);
let m = Math.floor((remaining / 1000 / 60) % 60);

let localTime = data.end.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit',
hour12:true
});

let label = "Next";

if(data.state === "active") label = "Active";
if(data.state === "prep") label = "Next";
if(data.state === "cooldown") label = "Wrap";

let barClass = "ghoulionBar";

if(data.state === "active") barClass += " active";
if(data.state === "prep") barClass += " alert";

let timerText =
"<div class='" + barClass + "'>" +
label + " • " + localTime +
" • " + h + "h " + m + "m</div>";

document.getElementById("ghoulionTimer").innerHTML = timerText;

}

function updateLongEventTicker(){

let now = new Date();

let events = longEvents
  .filter(e => e.active)

function buildTaskMap(){

  let map = {};

  rawData.forEach(e => {

    let key = e.d + "|" + e.task;

    if(!map[key]){
      map[key] = {
  d: e.d,
  task: e.task,
  times: [],
  events: [],
  categories: [],
  duration: e.duration,
  priority: e.priority
};
    }

    map[key].times.push(e.utc);
    map[key].events.push(e.event);
    map[key].categories.push(e.category);

  });

  return Object.values(map);
}

function classifyTasks(){
console.log("RAW DATA SAMPLE:", rawData[0]);
  let tasks = buildTaskMap();

  let triple = [];
  let double = [];
  let dayExclusive = [];

    }

    }

  });

  return {triple, double, dayExclusive};
}

function formatToLocalTimeFromDate(date){

  if(!date) return "";

  return date.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit',
    hour12: true
  });
}

function getTaskState(task){

  if(!task || !task.times || !task.times.length) return null;

  let now = new Date();

  let [h,m] = task.times[0].split(":").map(Number);

  let base = new Date();

  base.setUTCHours(h, m, 0, 0);

  let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let targetDay = days.indexOf(task.d);

  let diff = targetDay - base.getUTCDay();
  if(diff < 0) diff += 7;

  base.setUTCDate(base.getUTCDate() + diff);

  let end = new Date(base.getTime() + task.duration * 60 * 60 * 1000);

  if(now >= base && now <= end){
    return { status: "ACTIVE", time: base };
  }

  if(now < base){
    return { status: "UPCOMING", time: base };
  }

  let next = new Date(base);
  next.setUTCDate(next.getUTCDate() + 7);

  return { status: "UPCOMING", time: next };
}
  
function renderTriple(){

  let container = document.getElementById("tripleList");
  if(!container) return;

  let {triple} = getTasks();

  let list = triple
    .map(t => {

      return state ? {task:t, state} : null;
    })
    .filter(x => x);

  // 🔥 SORT (UNCHANGED LOGIC)
  list.sort((a,b)=>{

    let sa = a.state;
    let sb = b.state;

    if(sa.status !== sb.status){
      return sa.status === "ACTIVE" ? -1 : 1;
    }

    if(a.task.priority !== b.task.priority){
      return a.task.priority - b.task.priority;
    }

    return sa.time - sb.time;
  });

  // 🔥 FIND NEXT UPCOMING (ONLY ONE)
  let nextUpcomingIndex = list.findIndex(x => x.state.status === "UPCOMING");

  let html = "";

  list.forEach((x, index) => {

    let t = x.task;
    let state = x.state;

    let rowClass = "";

    if(state.status === "ACTIVE"){
      rowClass = "activeRow";
    }
    else if(index === nextUpcomingIndex){
      rowClass = "nextRow";
    }

    let timeStr = formatToLocalTimeFromDate(state.time);

    html += `
      <div class="row ${rowClass}">
        <span>${t.d}</span>
        <span>${timeStr} — ${t.task}</span>
      </div>
    `;
  });

  container.innerHTML = html;
}

function updateTimer(){

  let {triple} = getTasks();
  let now = new Date();

  let active = null;
  let upcoming = [];

  triple.forEach(t => {

    let s = getTaskState(t);
    if(!s) return;

    if(s.status === "ACTIVE"){
      if(!active || t.priority < active.task.priority){
        active = {task:t, state:s};
      }
    }

    if(s.status === "UPCOMING"){
      upcoming.push({task:t, state:s});
    }

  });

  let best = active;

  if(!best && upcoming.length){
    upcoming.sort((a,b)=>{
      if(a.task.priority !== b.task.priority){
        return a.task.priority - b.task.priority;
      }
      return a.state.time - b.state.time;
    });
    best = upcoming[0];
  }

  if(!best) return;

  let t = best.task;
  let s = best.state;

  let start = s.time;
  let end = new Date(start.getTime() + t.duration * 60 * 60 * 1000);

  let diff = (s.status === "ACTIVE" ? end - now : start - now);

  let mins = Math.floor(diff / 60000);
  let hrs = Math.floor(mins / 60);
  mins = mins % 60;

  let timerStr = `${String(hrs).padStart(2,"0")}:${String(mins).padStart(2,"0")}`;

  let statusEl = document.getElementById("tripleStatus");
  let taskEl = document.getElementById("tripleTask");
  let timeEl = document.getElementById("tripleTime");

  if(!statusEl || !taskEl || !timeEl) return;

  statusEl.innerText = `Triple Chain - ${s.status}`;
  taskEl.innerText = t.task;

  timeEl.innerHTML =
    (s.status === "ACTIVE"
      ? `<span style="color:#ff6b6b">Ends in ${timerStr}</span>`
      : `<span style="color:#4cff88">Starts in ${timerStr}</span>`)
    + " • " + formatToLocalTimeFromDate(start);
}

function updateTodayPanel(){

  let {triple, double, dayExclusive} = getTasks();

  let container = document.getElementById("todayPanel");
  let html = "";

  let now = new Date();
  let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let today = days[now.getUTCDay()];

  function sortTasks(a,b){

    let sa = a.state;
    let sb = b.state;

    let order = {ACTIVE:0, UPCOMING:1, COMPLETED:2};

    if(order[sa.status] !== order[sb.status]){
      return order[sa.status] - order[sb.status];
    }

    if(a.task.priority !== b.task.priority){
      return a.task.priority - b.task.priority;
    }

    return sa.time - sb.time;
  }

  function renderList(list, label, icon){

    list.forEach(x => {

      let t = x.task;
      let s = x.state;
      let p = prepMap[t.task];

      let start = s.time;
      let end = new Date(start.getTime() + t.duration * 60 * 60 * 1000);

      let diff = (s.status === "ACTIVE" ? end - now : start - now);

      let mins = Math.floor(diff / 60000);
      let hrs = Math.floor(mins / 60);
      mins = mins % 60;

      let timerStr = `${hrs}h ${mins}m`;

      let status =
        s.status === "ACTIVE"
          ? `${icon} ACTIVE • <span style="color:#ff6b6b">${timerStr}</span>`
          : s.status === "UPCOMING"
          ? `⭐ Upcoming • <span style="color:#4cff88">${timerStr}</span>`
          : `✔ Completed`;

      html += `
        <div class="row ${
          s.status === "ACTIVE" ? "activeRow" :
          s.status === "UPCOMING" ? "nextRow" : ""
        }">
          <span><b>◆ ${label}</b> - ${t.task}</span>
          <span>${status}</span>
        </div>
        ${p?.tip ? `<div class="prepTip saveItem">${p.tip}</div>` : ""}
      `;
    });

  }

  let todayTriple = triple
    .filter(t => t.d === today)
    .map(t => {
      let s = getTaskState(t);
      return s ? {task:t, state:s} : null;
    })
    .filter(x => x)
    .sort(sortTasks);

  if(todayTriple.length){
    renderList(todayTriple, "Triple", "⚡");
  }

  let todayDouble = double
    .filter(t => t.d === today)
    .map(t => {
      let s = getTaskState(t);
      return s ? {task:t, state:s} : null;
    })
    .filter(x => x)
    .sort(sortTasks);

  if(todayDouble.length){
    renderList(todayDouble, "Double", "🔹");
  }

  let todayExclusive = dayExclusive
    .filter(t => t.d === today)
    .map(t => {
      let s = getTaskState(t);
      return s ? {task:t, state:s} : null;
    })
    .filter(x => x)
    .sort(sortTasks);

  if(todayExclusive.length){
    renderList(todayExclusive, "Exclusive", "📌");
  }

  if(!todayTriple.length && !todayDouble.length && !todayExclusive.length){
    html = "<small>No priority tasks today</small>";
  }

  container.innerHTML = html;
}
  
updateTodayPanel();
